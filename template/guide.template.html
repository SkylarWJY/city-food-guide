<style>
:root{ /* ☀ light (default) */
  --bg:#faf9f7; --text:#16161b; --muted:#5f5f6b; --faint:#9a9aa6;
  --surface:rgba(0,0,0,.025); --surface-2:#ffffff;
  --border:rgba(0,0,0,.09); --border-strong:rgba(0,0,0,.2);
  --accent:#ef5d34; --accent-2:#ff5e7d;
  --card-bg:#ffffff; --shadow:0 18px 42px -24px rgba(0,0,0,.3);
  --glow1:rgba(255,138,76,.18); --glow2:rgba(255,94,125,.12);
  --nav-bg:rgba(250,249,247,.72); --noise:.45;
  --chip-bg:#16161b; --chip-fg:#fff;
  --r:18px;
}
[data-theme="dark"]{ /* ☾ dark */
  --bg:#08080a; --text:#f2f2f4; --muted:#9c9ca6; --faint:#646470;
  --surface:rgba(255,255,255,.024); --surface-2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.18);
  --accent:#ff8a4c; --accent-2:#ff5e7d;
  --card-bg:rgba(255,255,255,.024); --shadow:0 22px 54px -20px rgba(0,0,0,.72);
  --glow1:rgba(255,138,76,.15); --glow2:rgba(255,94,125,.1);
  --nav-bg:rgba(8,8,10,.62); --noise:.4;
  --chip-bg:#ffffff; --chip-fg:#0a0a0a;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Inter","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  line-height:1.5; letter-spacing:-0.01em; overflow-x:hidden;
  transition:background-color .35s ease, color .35s ease;
}
body::before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    radial-gradient(1100px 600px at 80% -10%, var(--glow1), transparent 60%),
    radial-gradient(900px 600px at 6% 2%, var(--glow2), transparent 55%);
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:var(--noise);
  background-image:radial-gradient(rgba(128,128,128,.16) 1px, transparent 1px);
  background-size:3px 3px;
}
::selection{background:rgba(239,93,52,.28); color:inherit}
a{color:inherit;text-decoration:none}

/* ===== header ===== */
.nav{position:sticky; top:0; z-index:50; backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); background:var(--nav-bg); border-bottom:1px solid var(--border)}
.nav-in{max-width:1240px; margin:0 auto; padding:13px 24px; display:flex; align-items:center; gap:14px}
.brand{display:flex; align-items:center; gap:11px; min-width:0}
.btext{display:block; min-width:0; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.sig{width:30px;height:30px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 4px 14px -2px rgba(239,93,52,.55);letter-spacing:-.04em}
.brand .wm{font-weight:740; letter-spacing:-0.03em; font-size:16px; white-space:nowrap}
.brand .wm em{font-style:normal;background:linear-gradient(100deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .sub{color:var(--faint); font-weight:500; font-size:13px; white-space:nowrap; margin-left:9px}
.spacer{flex:1}
.search{position:relative; width:min(280px,36vw)}
.search input{width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:11px; padding:9px 12px 9px 36px; font-size:13.5px; font-family:inherit; transition:.18s}
.search input::placeholder{color:var(--faint)}
.search input:focus{outline:none; border-color:var(--border-strong)}
.search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px;height:15px;color:var(--faint)}
.iconbtn{flex:0 0 auto; height:38px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); border-radius:11px; cursor:pointer; font-family:inherit; font-weight:600; font-size:13px; display:inline-flex; align-items:center; justify-content:center; gap:5px; transition:.16s; letter-spacing:-.01em}
.iconbtn:hover{border-color:var(--border-strong)}
#themeBtn{width:38px} #themeBtn svg{width:17px;height:17px}
#langBtn{padding:0 13px; min-width:46px}
.soc{width:38px; padding:0; text-decoration:none; border:none; color:#fff}
.soc svg{width:18px;height:18px}
.soc.ig{background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)}
.soc.xhs{background:#ff2442}
.soc.dy{background:#161823}
.soc .xhs-w{font-size:9.5px; font-weight:800; letter-spacing:-.5px; line-height:1}
.soc:hover{filter:brightness(1.08)}

/* ===== hero ===== */
.hero{max-width:1240px; margin:0 auto; padding:60px 24px 30px}
.eyebrow{display:inline-flex;align-items:center;gap:8px; font-size:11.5px; font-weight:600; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; padding:6px 13px; border:1px solid var(--border); border-radius:100px; background:var(--surface); margin-bottom:22px}
.eyebrow b{color:var(--accent); font-weight:700}
h1{font-size:clamp(38px,6.4vw,76px); line-height:1.02; font-weight:740; letter-spacing:-0.038em; max-width:15ch}
h1 .g{background:linear-gradient(105deg,var(--text) 28%,var(--accent) 72%,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.byline{display:flex; align-items:center; gap:10px; margin-top:22px; font-size:14px; color:var(--muted); font-weight:480}
.byline .s2{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px;overflow:hidden}
.byline .s2 img{width:100%;height:100%;object-fit:cover;display:block}
.byline b{color:var(--text); font-weight:640}
.sub{margin-top:18px; font-size:clamp(15px,1.7vw,18px); color:var(--muted); max-width:54ch; font-weight:430}
.stats{display:flex; gap:36px; margin-top:32px; flex-wrap:wrap}
.stat .v{font-size:30px; font-weight:720; letter-spacing:-0.02em; font-variant-numeric:tabular-nums}
.stat .v .max{color:var(--faint); font-weight:500; font-size:18px}
.stat .l{font-size:12.5px; color:var(--faint); margin-top:2px; letter-spacing:.02em}
.fresh{display:inline-flex; align-items:center; gap:8px; margin-top:20px; padding:7px 14px; border:1px solid var(--border); border-radius:100px; background:var(--surface-2); font-size:13px; font-weight:560; color:var(--muted)}
.fresh .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:freshpulse 2.4s infinite}
@keyframes freshpulse{0%{box-shadow:0 0 0 0 rgba(239,93,52,.45)}70%{box-shadow:0 0 0 8px rgba(239,93,52,0)}100%{box-shadow:0 0 0 0 rgba(239,93,52,0)}}

/* ===== unlock / subscribe gate ===== */
.unlock{max-width:1240px; margin:6px auto 4px; padding:0 24px}
.unlock-in{position:relative; overflow:hidden; border-radius:22px; border:1px solid var(--border);
  background:radial-gradient(680px 220px at 10% 0%, rgba(239,93,52,.12), transparent 60%),radial-gradient(680px 260px at 92% 130%, rgba(255,94,125,.12), transparent 60%),var(--card-bg);
  box-shadow:var(--shadow); padding:18px 28px; display:flex; gap:28px; align-items:center; flex-wrap:wrap}
.unlock-txt{flex:1 1 320px; min-width:0}
.unlock-txt h3{font-size:20px; font-weight:760; letter-spacing:-.02em; display:flex; align-items:center; gap:9px; line-height:1.2}
.unlock-txt h3 .lk{background:linear-gradient(100deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.unlock-txt p{margin-top:6px; font-size:13.5px; color:var(--muted); line-height:1.5}
.unlock-form{flex:1 1 300px; min-width:260px; max-width:440px; height:140px; overflow:hidden; display:flex; align-items:center}
.unlock-form iframe{width:100%!important; border:0!important}
.unlock-form:has(#unlockedPanel:not([hidden])){height:auto; overflow:visible}
.unlocked{width:100%}
.ul-btns{display:flex; flex-wrap:wrap; gap:10px}
.ul-btn{flex:1 1 160px; text-align:center; padding:12px 16px; border-radius:12px; font-size:14px; font-weight:680;
  border:1px solid var(--border); background:var(--card-bg); color:var(--text); text-decoration:none; white-space:nowrap;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
.ul-btn:hover{transform:translateY(-1px); box-shadow:var(--shadow); border-color:var(--border-strong)}
.ul-primary{border:0; color:#fff; background:linear-gradient(100deg,var(--accent),var(--accent-2)); box-shadow:0 8px 22px -10px rgba(239,93,52,.7)}
.ul-primary:hover{border:0}
.ul-hint{margin-top:11px; font-size:12px; color:var(--muted); line-height:1.5}
.coffee{max-width:1240px; margin:10px auto 0; padding:0 24px; text-align:center}
.coffee-btn{display:inline-flex; align-items:center; gap:10px; padding:13px 26px; border-radius:100px;
  font-size:15px; font-weight:720; letter-spacing:-.01em; color:#fff; text-decoration:none; cursor:pointer;
  background:linear-gradient(100deg,var(--accent),var(--accent-2)); box-shadow:0 10px 26px -10px rgba(239,93,52,.75);
  transition:transform .14s ease, box-shadow .14s ease}
.coffee-btn:hover{transform:translateY(-2px) rotate(-1deg); box-shadow:0 16px 34px -12px rgba(239,93,52,.85)}
.coffee-btn .coffee-emoji{font-size:18px; line-height:1}
.coffee-btn.poked{animation:coffeePop .42s ease}
@keyframes coffeePop{0%{transform:scale(1)}40%{transform:scale(1.09) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}
.coffee-sub{margin-top:10px; font-size:12.5px; color:var(--muted); line-height:1.5}
@media(max-width:560px){ .coffee{padding:0 16px} }
@media(max-width:760px){ .unlock{padding:0 16px} .unlock-in{padding:16px 18px; gap:10px} .unlock-txt h3{font-size:18px} }

/* ===== floating follow bar ===== */
.followbar{position:fixed; z-index:60; right:20px; bottom:20px; max-width:332px;
  display:flex; align-items:center; gap:11px; padding:11px 13px;
  border-radius:16px; border:1px solid var(--border); background:var(--card-bg);
  box-shadow:0 14px 36px -12px rgba(0,0,0,.4); backdrop-filter:saturate(1.25) blur(6px);
  transform:translateY(150%); opacity:0; transition:transform .42s cubic-bezier(.2,.8,.2,1), opacity .3s; pointer-events:none}
.followbar.show{transform:translateY(0); opacity:1; pointer-events:auto}
.fb-av{width:38px;height:38px;flex:0 0 auto;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:18px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 4px 14px -2px rgba(239,93,52,.55);letter-spacing:-.04em;overflow:hidden}
.fb-av img{width:100%;height:100%;object-fit:cover;display:block}
.fb-txt{flex:1 1 auto; min-width:0; font-size:12.5px; line-height:1.34; color:var(--text); font-weight:560}
.fb-txt b{color:var(--accent); font-weight:760}
.fb-acts{display:flex; gap:7px; flex:0 0 auto}
.fb-btn{width:33px;height:33px;border-radius:10px;display:grid;place-items:center;text-decoration:none;border:none; color:#fff; transition:.16s; line-height:1}
.fb-btn svg{width:16px;height:16px}
.fb-btn .xhs-w{font-size:8.5px;font-weight:800;letter-spacing:-.5px;line-height:1}
.fb-btn.ig{background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)}
.fb-btn.xhs{background:#ff2442}
.fb-btn.dy{background:#161823}
.fb-btn:hover{filter:brightness(1.08)}
.fb-x{position:absolute; top:-9px; right:-9px; width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:12px;line-height:1;box-shadow:0 3px 10px -3px rgba(0,0,0,.32);transition:.16s}
.fb-x:hover{color:var(--text);border-color:var(--border-strong)}
@media(max-width:560px){ .followbar{right:12px; left:12px; bottom:12px; max-width:none} }

/* ===== share modal ===== */
.shmo{position:fixed; inset:0; z-index:120; display:none; align-items:center; justify-content:center; padding:20px; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px)}
.shmo.show{display:flex}
.shmo-card{position:relative; width:100%; max-width:380px; background:var(--card-bg); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow); padding:22px; max-height:92vh; overflow:auto}
.shmo-x{position:absolute; top:13px; right:13px; width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:14px;line-height:1;transition:.16s}
.shmo-x:hover{color:var(--text);border-color:var(--border-strong)}
.shmo h4{font-size:16.5px;font-weight:760;letter-spacing:-.01em;margin-bottom:3px;color:var(--text)}
.shmo .sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.shmo-prev{width:170px;border-radius:12px;border:1px solid var(--border);display:block;margin:0 auto 14px}
.shmo-cap{width:100%;font-family:inherit;font-size:12px;line-height:1.55;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;resize:none;min-height:96px;margin-bottom:11px}
.shmo-row{display:flex;gap:8px;margin-bottom:13px}
.shmo-btn{flex:1;cursor:pointer;font-family:inherit;font-size:13px;font-weight:640;border-radius:11px;padding:11px;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--text);transition:.16s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.shmo-btn:hover{border-color:transparent;background:var(--chip-bg);color:var(--chip-fg)}
.shmo-btn.pri{background:linear-gradient(100deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent}
.shmo-btn.pri:hover{filter:brightness(1.07)}
.shmo-plats{display:flex;gap:9px;justify-content:center}
.shmo-plat{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;text-decoration:none;color:#fff;font-weight:800;font-size:13px;border:none;cursor:pointer;transition:.16s;letter-spacing:-.04em}
.shmo-plat:hover{filter:brightness(1.09)}
.shmo-plat .w{font-size:9.5px;font-weight:800;letter-spacing:-.4px}

/* ===== filters ===== */
.filters{position:sticky; top:60px; z-index:40; background:var(--nav-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border)}
.filters-in{max-width:1240px; margin:0 auto; padding:13px 24px; display:flex; gap:9px; overflow-x:auto; scrollbar-width:none}
.filters-in::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:540; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:8px 15px; display:inline-flex; align-items:center; gap:7px; transition:.16s; white-space:nowrap; letter-spacing:-0.01em}
.chip:hover{color:var(--text); border-color:var(--border-strong)}
.chip .n{font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums}
.chip.active{color:var(--chip-fg); background:var(--chip-bg); border-color:transparent; font-weight:620}
.chip.active .n{color:var(--chip-fg); opacity:.5}

/* ===== grid ===== */
.wrap{max-width:1240px; margin:0 auto; padding:30px 24px 80px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:20px}
.card{position:relative; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; background:var(--card-bg); transition:.22s transform cubic-bezier(.2,.7,.2,1),.22s border-color,.22s box-shadow}
.card:hover{transform:translateY(-4px); border-color:var(--border-strong); box-shadow:var(--shadow)}
.endcap{border:1px dashed var(--border-strong); border-radius:var(--r); background:linear-gradient(160deg,var(--glow1),var(--glow2)); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px 20px; gap:10px; min-height:160px}
.endcap .ec-k{font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent)}
.endcap .ec-t{font-size:18px; font-weight:760; letter-spacing:-.01em; color:var(--text); line-height:1.25}
.endcap .ec-s{font-size:12.5px; color:var(--muted); line-height:1.5; max-width:24ch}
.endcap .ec-links{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:2px}
.endcap .ec-links a{font-size:12px; font-weight:600; color:var(--text); text-decoration:none; border:1px solid var(--border-strong); border-radius:100px; padding:5px 12px; transition:.18s}
.endcap .ec-links a:hover{background:var(--chip-bg); color:var(--chip-fg); border-color:transparent}
.media{position:relative; aspect-ratio:4/5; background:#dcdce0; overflow:hidden}
[data-theme="dark"] .media{background:#111}
.track{display:flex; height:100%; width:100%; overflow-x:auto; scroll-snap-type:x mandatory; scrollbar-width:none; scroll-behavior:smooth}
.track::-webkit-scrollbar{display:none}
.track img{flex:0 0 100%; width:100%; height:100%; object-fit:cover; scroll-snap-align:center; display:block}
.media::after{content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg,rgba(0,0,0,.34) 0%,transparent 22%,transparent 60%,rgba(0,0,0,.5) 100%)}
.badge{position:absolute; top:11px; left:11px; z-index:2; font-size:11.5px; font-weight:560; color:#fff; background:rgba(0,0,0,.42); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.18); padding:4px 10px; border-radius:100px}
.num{position:absolute; top:11px; right:13px; z-index:2; font-size:12px; font-weight:680; color:rgba(255,255,255,.95); font-variant-numeric:tabular-nums; text-shadow:0 1px 8px rgba(0,0,0,.7)}
.num::before{content:"#"; color:rgba(255,255,255,.5); margin-right:1px}
.dots{position:absolute; bottom:10px; left:0; right:0; z-index:2; display:flex; gap:5px; justify-content:center}
.dots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);transition:.2s}
.dots i.on{background:#fff; width:14px; border-radius:3px}
.arrow{position:absolute; top:50%; transform:translateY(-50%); z-index:3; width:30px;height:30px;border-radius:50%; border:1px solid rgba(255,255,255,.25); background:rgba(0,0,0,.4); backdrop-filter:blur(6px); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:.18s; font-size:15px; line-height:1}
.media:hover .arrow{opacity:1}
.arrow.l{left:9px} .arrow.r{right:9px}
.arrow:hover{background:rgba(0,0,0,.7)}
.body{padding:15px 16px 16px}
.name{font-size:16px; font-weight:640; letter-spacing:-0.02em; line-height:1.25}
.type{margin-top:5px; font-size:12.5px; color:var(--muted); font-weight:430}
.addr{margin-top:11px; font-size:12px; color:var(--faint); display:flex; gap:6px; align-items:flex-start; line-height:1.4}
.addr svg{flex:0 0 auto; width:12px;height:12px;margin-top:2px;opacity:.8}
.maplink{margin-top:13px; display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:560; color:var(--accent); transition:.15s gap}
.maplink:hover{gap:9px}
.viewtag{margin-left:7px; font-size:10.5px; font-weight:560; color:var(--accent-2); border:1px solid rgba(255,94,125,.45); border-radius:5px; padding:1px 6px; vertical-align:1px}
.empty{text-align:center; padding:90px 20px; color:var(--faint)}

    x.fillStyle='#fff'; x.textAlign='left'; x.textBaseline='middle'; x.fillText(pt,P+pad,py+ph/2+1); x.textBaseline='alphabetic';
    // #N badge top-right
    x.font=`700 26px ${ui}`; const nt='#'+d.n, nw=x.measureText(nt).width;
    x.fillStyle='rgba(0,0,0,.46)'; roundRect(x,W-P-nw-32,py,nw+32,ph,23); x.fill();
    x.fillStyle='#fff'; x.textBaseline='middle'; x.fillText(nt,W-P-nw-16,py+ph/2+1); x.textBaseline='alphabetic';
    // content
    x.textAlign='left';
    x.fillStyle=accent; x.font=`700 25px ${ui}`;
    x.fillText((isZh?'SKYLAR 私藏 · ':'SKYLAR’S PICK · ')+(isZh?gLabel(d.group):groupEn[d.group]||d.group),P,PH+58);
    x.fillStyle=ink; x.font=`800 64px ${ui}`;
    let nm=d.name; if(x.measureText(nm).width>W-2*P){while(x.measureText(nm+'…').width>W-2*P&&nm.length>1)nm=nm.slice(0,-1); nm+='…';}
    x.fillText(nm,P,PH+138);
    x.fillStyle=muted; x.font=`500 34px ${cjk}`; x.fillText(tLabel(d),P,PH+196);
    x.fillStyle=faint; x.font=`400 30px ${cjk}`; x.fillText('📍 '+aLabel(d),P,PH+252);
    x.fillStyle=accent; x.font=`600 29px ${cjk}`;
    x.fillText(isZh?'完整 100 家 · 一键导航地图 →':'Full 100 spots · one-tap map →',P,PH+330);
    // footer
    const fy=H-128;
    x.strokeStyle=dark?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)'; x.lineWidth=1; x.beginPath(); x.moveTo(P,fy); x.lineTo(W-P,fy); x.stroke();
    x.fillStyle=ink; x.font=`700 29px ${ui}`; x.fillText("Skylar's NYC Guide",P,fy+50);
    x.fillStyle=muted; x.font=`500 25px ${cjk}`; x.fillText('IG {{IG_HANDLE}}  ·  小红书 {{XHS_HANDLE}}',P,fy+88);
    x.textAlign='right'; x.fillStyle=accent; x.font=`600 25px ${ui}`; x.fillText('{{SITE_DISPLAY_URL}}',W-P,fy+88);
    const txt=isZh?`${d.name} · ${tLabel(d)} —— {{CAPTION_BRAND_ZH}} #${d.n}`:`${d.name} · ${tLabel(d)} — {{CAPTION_BRAND_EN}} #${d.n}`;
    const caption=isZh
      ? `${txt}\n\n📍 完整 100 家 + 一键导航 👉 ${SHARE_LINK}\n关注 {{IG_HANDLE}} 每月加新店\n\n#纽约美食 #纽约探店 #nyceats #${d.group}`
      : `${txt}\n\n📍 Full 100 spots + map 👉 ${SHARE_LINK}\nFollow {{IG_HANDLE}}\n\n#nyceats #nycfood #${(groupEn[d.group]||d.group)}`;
    await new Promise(res=>cv.toBlob(blob=>{ shareResult(blob,'nyc-'+d.n+'.png',caption); res(); },'image/png'));
  }finally{ genStoreCard._busy=false; }
}

/* ===== Explore Map ===== */
const GEO = {{GEO_JSON}};
const GROUP_COLORS={"日料":"#e0564a","韩餐":"#f0883e","中餐":"#d6a417","法餐":"#6f86d6","意餐":"#3fae74","海鲜":"#21b3c0","美式":"#b86bd6","各国":"#c98a5e","酒吧":"#8a8f98","风景":"#ff5e7d"};
const MAPUI={zh:{title:"探店地图",sub:"100 家全都在地图上 · 点开图钉直接导航过去",omakase:"Omakase",nav:"导航过去 →"},
             en:{title:"Explore Map",sub:"All 100 spots on the map · tap a pin to navigate",omakase:"Omakase",nav:"Navigate →"}};
let _map=null,_tiles=null,_markers=[],_mapReady=false,mapActive="全部";

function mapMatch(d,k){
  if(k==="全部")return true;
  if(k==="风景")return !!d.view;
  if(k==="__oma__")return /omakase/i.test(d.type)||/omakase/i.test(typeEn[d.type]||"");
  return d.group===k;
}
function setTiles(){
  if(!_map)return;
  if(_tiles)_map.removeLayer(_tiles);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const url=dark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  _tiles=L.tileLayer(url,{maxZoom:19,subdomains:'abcd',attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(_map);
}
function mkIcon(color){return L.divIcon({className:'mk',html:'<span style="--mc:'+color+'"></span>',iconSize:[16,16],iconAnchor:[8,8],popupAnchor:[0,-9]});}
function popupHtml(d){
  const u=UI[lang],m=MAPUI[lang];
  return '<div class="mpop"><div class="mpop-img" style="background-image:url(\''+d.imgs[0]+'\')"><span class="mpop-n">#'+d.n+'</span></div>'
    +'<div class="mpop-body"><div class="mpop-name">'+d.name+(d.view?'<span class="vt">'+u.viewTag+'</span>':'')+'</div>'
    +'<div class="mpop-type">'+tLabel(d)+'</div><div class="mpop-addr">'+aLabel(d)+'</div>'
    +'<a class="mpop-nav" href="'+mapUrl(d)+'" target="_blank" rel="noopener">'+m.nav+'</a></div></div>';
}
function buildMapFilters(){
  const el=document.getElementById('exFilters'); if(!el)return; el.innerHTML="";
  const keys=groupZh.concat(["__oma__"]);
  keys.forEach(k=>{
    const cnt=data.filter(d=>GEO[d.name]&&mapMatch(d,k)).length;
    if(cnt===0&&k!=="全部")return;
    const b=document.createElement('button');
    b.className='exchip'+(k===mapActive?' on':'');
    const color=GROUP_COLORS[k];
    const label=k==="__oma__"?MAPUI[lang].omakase:gLabel(k);
    b.innerHTML=(color?'<i style="background:'+color+'"></i>':'')+label+'<span class="n">'+cnt+'</span>';
    b.onclick=()=>{mapActive=k;buildMapFilters();applyMapFilter();};
    el.appendChild(b);
  });
}
function applyMapFilter(){
  if(!_map)return;
  const shown=[];
  _markers.forEach(mk=>{ if(mapMatch(mk._d,mapActive)){mk.addTo(_map);shown.push(mk);} else _map.removeLayer(mk); });
  if(shown.length){ _map.fitBounds(L.featureGroup(shown).getBounds().pad(0.18),{maxZoom:14}); }
}
function initMap(){
  if(_mapReady||!window.L||!document.getElementById('exMap'))return; _mapReady=true;
  _map=L.map('exMap',{scrollWheelZoom:false,zoomControl:true}).setView([40.736,-73.99],11.4);
  setTiles();
  data.forEach(d=>{ const g=GEO[d.name]; if(!g)return;
    const color=d.view?GROUP_COLORS['风景']:(GROUP_COLORS[d.group]||'#8a8f98');
    const mk=L.marker(g,{icon:mkIcon(color)}); mk._d=d;
    mk.bindPopup(()=>popupHtml(d),{maxWidth:240,minWidth:212,autoPanPadding:[28,28]});
    mk.addTo(_map); _markers.push(mk);
  });
  buildMapFilters(); applyMapFilter();
  setTimeout(()=>{ if(_map){_map.invalidateSize(); applyMapFilter();} },220);
}

applyTheme();
applyLang();
window.addEventListener('load',initMap);

/* ===== floating follow bar ===== */
(function(){
  const bar=document.getElementById('followBar'); if(!bar) return;
  const FB_KEY='food100-followbar-dismissed';
  let dismissed=false; try{ dismissed=localStorage.getItem(FB_KEY)==='1'; }catch(e){}
  let shown=false;
  function onScroll(){
    if(dismissed) return;
    const trigger=(window.scrollY||window.pageYOffset)>620;
    if(trigger&&!shown){ shown=true; bar.classList.add('show'); }
    else if(!trigger&&shown){ shown=false; bar.classList.remove('show'); }
  }
  document.getElementById('fbClose').addEventListener('click',()=>{
    dismissed=true; bar.classList.remove('show');
    try{ localStorage.setItem(FB_KEY,'1'); }catch(e){}
  });
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
})();
</script>
